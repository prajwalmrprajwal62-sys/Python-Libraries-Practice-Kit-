<!DOCTYPE html>
<html>
<head>
    <title>Hackathon Test</title>
</head>
<body>

<h2>Study Suggestion</h2>

<input type="number" id="hours" placeholder="Study Hours">
<input type="text" id="mood" placeholder="Mood">
<button onclick="sendData()">Get Suggestion</button>

<p id="result"></p>

<script>
async function sendData() {
    const hours = document.getElementById("hours").value;
    const mood = document.getElementById("mood").value;

    const response = await fetch("http://127.0.0.1:5000/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            study_hours: Number(hours),
            mood: mood
        })
    });

    const data = await response.json();
    document.getElementById("result").innerText = data.suggestion || data.error;
}
</script>

</body>
</html>
